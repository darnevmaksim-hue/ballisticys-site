<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BALLISTICYS // HARDCORE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="radar-bg"></div>

    <header class="hero">
        <h1>BALLISTICYS</h1>
    </header>

    <div class="main-container">
        <div class="grid-layout">
            <!-- Основной контент -->
            <main>
                <section class="reveal">
                    <h2 class="section-title">SYSTEM_CORE</h2>
                    <div class="panel">
                        <div class="mod-card">
                            <h3>FABRIC_2.0</h3>
                            <p>PRIMARY_BALLISTIC_ENGINE</p>
                            <a href="downloads/bbb-fabric-port-2.0pre4-fabric-port.jar" class="btn" download>DOWNLOAD_CORE</a>
                        </div>
                        <div class="mod-card">
                            <h3>FORGE_1.0</h3>
                            <p>STABLE_FORGE_BUILD</p>
                            <a href="downloads/blur-mod-1.0.0-forge.jar" class="btn" download>DOWNLOAD_CORE</a>
                        </div>
                    </div>
                </section>

                <section class="reveal" style="margin-top: 50px;">
                    <h2 class="section-title">INSTALLATION</h2>
                    <div class="panel" style="font-size: 1.5rem; font-weight: 900;">
                        01. SELECT_VERSION <br>
                        02. MOVE_TO_MODS <br>
                        03. EXECUTE_CLIENT
                    </div>
                </section>
            </main>

            <!-- Сайдбар -->
            <aside>
                <section class="reveal">
                    <h2 class="section-title">DATA</h2>
                    <div class="panel">
                        <div class="telemetry-item">
                            <span style="font-size: 0.8rem; opacity: 0.5;">STABILITY</span>
                            <div class="val">98%</div>
                        </div>
                        <div class="telemetry-item">
                            <span style="font-size: 0.8rem; opacity: 0.5;">LOCK_ON</span>
                            <div class="val">112ms</div>
                        </div>
                    </div>
                </section>

                <section class="reveal" style="margin-top: 50px;">
                    <h2 class="section-title">INJECTOR</h2>
                    <div class="panel">
                        <a href="downloads/ballisticys-injector-toolkit.zip" class="btn" download>GET_ZIP</a>
                        <a href="downloads/ballisticys-fabric-agent-1.0.0.jar" class="btn" style="background: transparent; color: #fff; border: 2px solid #fff;" download>GET_AGENT</a>
                    </div>
                </section>
            </aside>
        </div>
    </div>

    <footer style="padding: 100px; text-align: center; border-top: 5px solid var(--accent); font-weight: 900; font-size: 2rem;">
        BALLISTICYS // 2026
    </footer>

    <script src="script.js"></script>
</body>
</html>
